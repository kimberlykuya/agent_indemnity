<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Agent Indemnity — System Architecture</text>
  <text x="550" y="62" text-anchor="middle" fill="#6b7280" font-size="12">USDC-Backed AI Performance Bond on Arc Network</text>

  <!-- USER -->
  <rect x="30" y="270" width="120" height="60" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="297" text-anchor="middle" fill="#d1d5db" font-size="11" font-weight="600">👤 User</text>
  <text x="90" y="314" text-anchor="middle" fill="#6b7280" font-size="9">(Next.js Frontend)</text>

  <!-- FastAPI -->
  <rect x="200" y="260" width="140" height="80" rx="10" fill="#1a2332" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="290" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">⚡ FastAPI</text>
  <text x="270" y="307" text-anchor="middle" fill="#6b7280" font-size="9">Backend Server</text>
  <text x="270" y="322" text-anchor="middle" fill="#6b7280" font-size="9">/agent/chat · /bond/slash</text>

  <!-- Gemini Router -->
  <rect x="400" y="160" width="160" height="70" rx="10" fill="#1a2332" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="190" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">🧠 Gemini Router</text>
  <text x="480" y="207" text-anchor="middle" fill="#6b7280" font-size="9">gemini-3-flash-preview</text>
  <text x="480" y="220" text-anchor="middle" fill="#6b7280" font-size="8">Structured JSON Classification</text>

  <!-- Featherless Models -->
  <rect x="620" y="100" width="160" height="70" rx="10" fill="#1a2332" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="128" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">🪶 Featherless</text>
  <text x="700" y="145" text-anchor="middle" fill="#6b7280" font-size="9">Specialist Models</text>
  <text x="700" y="158" text-anchor="middle" fill="#6b7280" font-size="8">General · Technical · Legal</text>

  <!-- Gemini Fallback -->
  <rect x="620" y="190" width="160" height="60" rx="10" fill="#1a2332" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="215" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">🧠 Gemini Pro</text>
  <text x="700" y="232" text-anchor="middle" fill="#6b7280" font-size="9">Fallback / Complex</text>

  <!-- Anomaly Detector -->
  <rect x="400" y="300" width="160" height="60" rx="10" fill="#1a2332" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="326" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700">🛡️ Anomaly Detector</text>
  <text x="480" y="343" text-anchor="middle" fill="#6b7280" font-size="9">Rule-Based Jailbreak Detection</text>

  <!-- Action Controller -->
  <rect x="400" y="400" width="170" height="80" rx="10" fill="#1a2332" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="428" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">🎯 Action Controller</text>
  <text x="485" y="445" text-anchor="middle" fill="#6b7280" font-size="9">Gemini Function Calling</text>
  <text x="485" y="460" text-anchor="middle" fill="#10b981" font-size="8" font-weight="600">settle_premium()</text>
  <text x="485" y="472" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">slash_performance_bond()</text>

  <!-- Bond Manager -->
  <rect x="650" y="400" width="150" height="60" rx="10" fill="#1a2332" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="426" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">📦 Bond Manager</text>
  <text x="725" y="443" text-anchor="middle" fill="#6b7280" font-size="9">On-Chain Tx Builder</text>

  <!-- Arc PerformanceBond.sol -->
  <rect x="860" y="380" width="200" height="80" rx="10" fill="#0d1b0d" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="960" y="408" text-anchor="middle" fill="#10b981" font-size="12" font-weight="700">⛓ PerformanceBond.sol</text>
  <text x="960" y="425" text-anchor="middle" fill="#6b7280" font-size="9">Arc Testnet (Chain 5042002)</text>
  <text x="960" y="440" text-anchor="middle" fill="#4ade80" font-size="8">stakeBond · topUpBond · slashBond</text>
  <text x="960" y="453" text-anchor="middle" fill="#6b7280" font-size="8">USDC-Backed Smart Contract</text>

  <!-- Circle Nanopayments -->
  <rect x="200" y="500" width="180" height="70" rx="10" fill="#1a2332" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="528" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">💳 Circle Gateway</text>
  <text x="290" y="545" text-anchor="middle" fill="#6b7280" font-size="9">Nanopayments (x402)</text>
  <text x="290" y="558" text-anchor="middle" fill="#6b7280" font-size="8">Per-Request USDC Pricing</text>

  <!-- Payment Meter -->
  <rect x="200" y="400" width="140" height="60" rx="10" fill="#1a2332" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="426" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">📊 Payment Meter</text>
  <text x="270" y="443" text-anchor="middle" fill="#6b7280" font-size="9">$0.001–$0.01 / request</text>

  <!-- WebSocket -->
  <rect x="30" y="400" width="120" height="60" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="426" text-anchor="middle" fill="#d1d5db" font-size="10" font-weight="600">📡 WebSocket</text>
  <text x="90" y="443" text-anchor="middle" fill="#6b7280" font-size="8">Live TxFeed + Alerts</text>

  <!-- ARROWS -->
  <!-- User → FastAPI -->
  <line x1="150" y1="300" x2="195" y2="300" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="172" y="293" text-anchor="middle" fill="#6b7280" font-size="7">HTTP</text>

  <!-- FastAPI → Gemini Router -->
  <line x1="340" y1="275" x2="396" y2="210" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>
  <text x="360" y="235" text-anchor="middle" fill="#8b5cf6" font-size="7">Route</text>

  <!-- Gemini Router → Featherless -->
  <line x1="560" y1="180" x2="616" y2="148" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>

  <!-- Gemini Router → Gemini Fallback -->
  <line x1="560" y1="200" x2="616" y2="215" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="4,3"/>

  <!-- FastAPI → Anomaly Detector -->
  <line x1="340" y1="310" x2="396" y2="325" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="360" y="310" text-anchor="middle" fill="#ef4444" font-size="7">Scan</text>

  <!-- FastAPI → Action Controller -->
  <line x1="340" y1="335" x2="396" y2="420" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Action Controller → Bond Manager -->
  <line x1="570" y1="435" x2="646" y2="430" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Bond Manager → PerformanceBond.sol -->
  <line x1="800" y1="430" x2="856" y2="420" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="828" y="418" text-anchor="middle" fill="#10b981" font-size="7">TX</text>

  <!-- Payment Meter → Circle -->
  <line x1="270" y1="460" x2="270" y2="496" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- FastAPI → Payment Meter -->
  <line x1="270" y1="340" x2="270" y2="396" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="280" y="370" text-anchor="start" fill="#3b82f6" font-size="7">Price</text>

  <!-- FastAPI → WebSocket -->
  <line x1="200" y1="335" x2="150" y2="400" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="160" y="365" text-anchor="middle" fill="#6b7280" font-size="7">Events</text>

  <!-- Legend -->
  <rect x="30" y="610" width="1040" height="70" rx="8" fill="#111111" stroke="#1f2937" stroke-width="1"/>
  <text x="50" y="632" fill="#6b7280" font-size="10" font-weight="600">LEGEND:</text>
  
  <rect x="120" y="622" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="138" y="632" fill="#9ca3af" font-size="9">Gemini AI (Router/Fallback)</text>
  
  <rect x="300" y="622" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="318" y="632" fill="#9ca3af" font-size="9">Featherless Specialist Models</text>
  
  <rect x="500" y="622" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="518" y="632" fill="#9ca3af" font-size="9">Bond Operations (On-Chain)</text>
  
  <rect x="700" y="622" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="718" y="632" fill="#9ca3af" font-size="9">Anomaly Detection</text>
  
  <rect x="880" y="622" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="898" y="632" fill="#9ca3af" font-size="9">Circle USDC Payments</text>

  <text x="550" y="665" text-anchor="middle" fill="#4b5563" font-size="9">Every request is routed → priced → fulfilled → scanned → settled on-chain. Anomalies trigger automatic bond slashing.</text>
</svg>
